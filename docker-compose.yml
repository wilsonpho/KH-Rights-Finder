services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: khrights
      POSTGRES_USER: khrights
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khrights"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://khrights:${DB_PASSWORD:-localdev}@db:5432/khrights
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini

  worker:
    build: ./backend
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://khrights:${DB_PASSWORD:-localdev}@db:5432/khrights
      SCRAPER_DEBUG: ${SCRAPER_DEBUG:-0}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./data/snapshots:/data/snapshots

  web:
    build: ./frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      REACT_EDITOR: "none"
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules

volumes:
  pgdata:
